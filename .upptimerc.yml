# Uppo public status — powered by Upptime (https://upptime.js.org)
owner: uppo-helpdesk
repo: uppo-status

sites:
  - name: App Uppo — app.uppo.io
    slug: app
    url: https://app.uppo.io
  - name: API Uppo — api.uppo.io
    slug: api
    url: https://api.uppo.io/api/v2/public/status
    expectedStatusCodes:
      - 200
  - name: Portale Self-Service — uppo.portal.uppo.io
    slug: portal-uppo
    url: https://uppo.portal.uppo.io
  - name: SSO Uppo — sso.uppo.io
    slug: sso
    url: https://sso.uppo.io/realms/Uppo
    expectedStatusCodes:
      - 200

status-website:
